<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Подзадача 1 — Случайная масть</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <a href="index.html">← К списку</a>
    <h1>1. Случайная масть</h1>
  </header>

  <section>
    <h2>Текст задания</h2>
    <p>Создать HTML-страницу, которая при загрузке случайным образом выводит одну из четырёх карточных мастей.</p>
  </section>

  <section>
    <h2>Результат</h2>
    <div class="suit-display">
      <div id="suit-symbol" class="suit-symbol"></div>
      <div id="suit-name" class="suit-name"></div>
    </div>
  </section>

  <script>
    const symbols = ['♠', '♥', '♦', '♣'];
    const names = ['Пики', 'Червы', 'Бубны', 'Трефы'];
    const colors = ['black', 'red', 'red', 'black'];
    const n = Math.floor(Math.random() * 4);
    const sym = document.getElementById('suit-symbol');
    sym.textContent = symbols[n];
    sym.style.color = colors[n];
    document.getElementById('suit-name').textContent = names[n];
  </script>

</body>
</html>
